<div class="login-page">
  <div class="login-card">
    <div class="login-brand mb-4">
      <div class="login-icon">
        <i class="fa-solid fa-van-shuttle"></i>
      </div>

      <div>
        <h1 class="h4 mb-1">EAC - Tio Carona</h1>
        <p class="text-body-secondary mb-0">
          Acesse para gerenciar o encontro.
        </p>
      </div>
    </div>

    @if (mensagemErro()) {
    <div class="alert alert-danger py-2 px-3 small">
      <i class="fa-solid fa-triangle-exclamation me-2"></i>
      {{ mensagemErro() }}
    </div>
    }

    <form (ngSubmit)="entrar()">
      <div class="mb-3">
        <label for="username" class="form-label">Usuário</label>
        <input id="username" pInputText type="text" name="username" class="w-100" [(ngModel)]="username"
          autocomplete="username" />
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Senha</label>
        <input id="password" pInputText type="password" name="password" class="w-100" [(ngModel)]="password"
          autocomplete="current-password" />
      </div>

      <button pButton type="submit" label="Entrar" icon="fa-solid fa-right-to-bracket" class="w-100"
        [loading]="carregando()">
      </button>
    </form>

    <div class="small text-body-secondary mt-4">
      Usuário inicial em ambiente local: <strong>admin</strong>.
      Altere a senha/variáveis antes de produção.
    </div>
  </div>
</div>
