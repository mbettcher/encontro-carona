services:
  tio-carona-postgres:
    image: postgres:16-alpine
    container_name: tio-carona-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Sao_Paulo
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/backups:/backups
    networks:
      - tio-carona-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  tio-carona-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: tio-carona-backend:1.0.0
    container_name: tio-carona-backend
    restart: unless-stopped
    depends_on:
      tio-carona-postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://tio-carona-postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION_MINUTES: ${APP_JWT_EXPIRATION_MINUTES}
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME}
      APP_ADMIN_INITIAL_PASSWORD: ${APP_ADMIN_INITIAL_PASSWORD}
      APP_ADMIN_NAME: ${APP_ADMIN_NAME}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS}
      TZ: America/Sao_Paulo
    networks:
      - tio-carona-internal
    expose:
      - "8080"
    mem_limit: 768m

  tio-carona-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: tio-carona-frontend:1.0.0
    container_name: tio-carona-frontend
    restart: unless-stopped
    depends_on:
      - tio-carona-backend
    networks:
      - tio-carona-internal
      - proxy-public
    expose:
      - "80"
    mem_limit: 128m

networks:
  tio-carona-internal:
    name: tio-carona-internal
    driver: bridge

  proxy-public:
    external: true
