# Arquivo de referência. NÃO copie cegamente se você ainda acessa a VPS por senha.
# Antes de desabilitar senha/root, configure e teste chave SSH em outra sessão aberta.

Port 22
PermitRootLogin prohibit-password
PasswordAuthentication yes
PubkeyAuthentication yes
MaxAuthTries 5
X11Forwarding no
ClientAliveInterval 300
ClientAliveCountMax 2
