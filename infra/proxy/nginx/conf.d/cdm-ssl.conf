server {
    listen 80;
    server_name cdm.dev.br www.cdm.dev.br 185.225.22.209;

    access_log /var/log/nginx/cdm-http-access.log;
    error_log  /var/log/nginx/cdm-http-error.log warn;

    # Mantém o desafio HTTP-01 acessível para renovações.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location = /health-check-cdm.txt {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://cdm.dev.br$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;

    server_name cdm.dev.br www.cdm.dev.br;

    ssl_certificate     /etc/letsencrypt/live/cdm.dev.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cdm.dev.br/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    access_log /var/log/nginx/cdm-ssl-access.log;
    error_log  /var/log/nginx/cdm-ssl-error.log warn;    

    location = / {
        return 302 https://cdm.dev.br/login;
    }

    location / {
        proxy_pass http://tio-carona-frontend:80;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
