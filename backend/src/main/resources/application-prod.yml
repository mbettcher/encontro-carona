spring:
  application:
    name: encontro-carona-api

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost,http://127.0.0.1}

  security:
    jwt-secret: ${APP_JWT_SECRET}
    jwt-expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:480}
    initial-admin:
      username: ${APP_ADMIN_USERNAME}
      password: ${APP_ADMIN_INITIAL_PASSWORD}
      name: ${APP_ADMIN_NAME:Administrador}
